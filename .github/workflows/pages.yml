name: Deploy site to GitHub Pages

# Публикует обычный сайт из корня репозитория на https://dephaq.github.io/bit-company-website/
# через GitHub Actions (а не классический "Deploy from a branch").
#
# ⚠️ Перед первым запуском: в Settings → Pages → Source выбрать "GitHub Actions".
# Иначе job соберёт artifact, но не задеплоит.

on:
  push:
    branches: [main]
    paths:
      - '*.html'
      - 'assets/**'
      - 'products/**'
      - 'services/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build static site artifact
        run: |
          mkdir -p _site
          cp ./*.html _site/
          cp -R assets products services _site/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

name: Deploy presentation to GitHub Pages

# Публикует презентацию из папки `presentation/` на https://dephaq.github.io/bit-company-website/
# через GitHub Actions (а не классический "Deploy from a branch").
#
# ⚠️ Перед первым запуском: в Settings → Pages → Source выбрать "GitHub Actions".
# Иначе job соберёт artifact, но не задеплоит.

on:
  push:
    branches: [main]
    paths:
      - 'presentation/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload presentation artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./presentation

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
